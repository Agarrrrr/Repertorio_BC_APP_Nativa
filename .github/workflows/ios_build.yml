name: Build & Deploy iOS App to App Store Connect

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build & Deploy iOS App
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Restore GoogleService-Info.plist from secret if exists
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist
            echo "GoogleService-Info.plist restored from secrets."
          else
            echo "Using repository GoogleService-Info.plist."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Import Signing Certificate & Provisioning Profile (if secrets present)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_P12_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD || secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'Television2012' }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ] && [ -n "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "Setting up keychain and signing certificates..."
            CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
            echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

            security create-keychain -p "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH

            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "${P12_PASSWORD:-Television2012}" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH

            # CRITICO: agregar el keychain a la lista de busqueda. Sin esto,
            # Xcode NO encuentra el certificado importado e intenta crear uno
            # nuevo -> error "maximum number of certificates".
            security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
            security default-keychain -d user -s $KEYCHAIN_PATH

            # Instalar el perfil como <UUID>.mobileprovision (lo que Xcode espera)
            DECODED=$RUNNER_TEMP/profile_decoded.plist
            security cms -D -i "$PP_PATH" > "$DECODED" 2>/dev/null
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$DECODED")
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
            echo "Certificate & Provisioning Profile installed (UUID: $PROFILE_UUID)."
          else
            echo "No signing certificates provided in Secrets. Proceeding with unsigned build."
          fi

      - name: Build iOS App (.ipa or Runner.app)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_P12_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 || secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ] && [ -n "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
            DECODED=$RUNNER_TEMP/profile_decoded.plist
            if [ ! -f "$DECODED" ]; then
              security cms -D -i "$PP_PATH" > "$DECODED" 2>/dev/null
            fi
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$DECODED")
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$DECODED")
            TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamID:0" "$DECODED")
            echo "Signing with profile: $PROFILE_NAME ($PROFILE_UUID), team: $TEAM_ID"

            # 1) Signing MANUAL en el proyecto: usa el certificado y perfil ya
            #    instalados; Xcode NO intenta crear certificados nuevos.
            export PROFILE_NAME TEAM_ID
            ruby -e "require 'xcodeproj'; prj = Xcodeproj::Project.open('ios/Runner.xcodeproj'); prj.targets.select { |t| t.name == 'Runner' }.each { |t| t.build_configurations.each { |c| c.build_settings['CODE_SIGN_STYLE'] = 'Manual'; c.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'; c.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROFILE_NAME']; c.build_settings['DEVELOPMENT_TEAM'] = ENV['TEAM_ID'] } }; prj.save"

            # 2) export_options.plist dinamico con el perfil real
            EXPORT_PLIST=$RUNNER_TEMP/export_options.plist
            rm -f "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :method string app-store" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :teamID string $TEAM_ID" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.lldm.bc string $PROFILE_UUID" "$EXPORT_PLIST"

            # 3) Compilar y exportar el IPA
            flutter build ipa --release --export-options-plist="$EXPORT_PLIST"
          else
            flutter build ios --no-codesign --release
          fi

      - name: Upload IPA to App Store Connect / TestFlight (if API Key provided)
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY" ] && [ -n "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "Uploading IPA to App Store Connect..."
            mkdir -p ~/.appstoreconnect/private_keys
            echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

            xcrun xcrun altool --upload-app -f build/ios/ipa/*.ipa \
              --type ios \
              --apiKey "$APP_STORE_CONNECT_KEY_ID" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
            echo "IPA uploaded to App Store Connect successfully!"
          else
            echo "App Store Connect API Key not provided. Skipping upload."
          fi

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifact
          path: |
            build/ios/ipa/*.ipa
            build/ios/iphoneos/Runner.app
          if-no-files-found: ignore
