name: Build & Deploy iOS App to App Store Connect

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build & Deploy iOS App
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - name: Restore GoogleService-Info.plist from secret if exists
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" > ios/Runner/GoogleService-Info.plist
            echo "GoogleService-Info.plist restored from secrets."
          else
            echo "Using repository GoogleService-Info.plist."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Import Signing Certificate (if secrets present)
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_P12_BASE64 || secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD || secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'Television2012' }}
        run: |
          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Setting up keychain and signing certificates..."
            export CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

            python3 -c "import base64, re, os; dec = lambda k, p: open(p, 'wb').write(base64.b64decode(re.sub(r'[^A-Za-z0-9+/=]', '', os.environ.get(k, ''))[:len(re.sub(r'[^A-Za-z0-9+/=]', '', os.environ.get(k, '')))-len(re.sub(r'[^A-Za-z0-9+/=]', '', os.environ.get(k, '')))%4])) if os.environ.get(k) else None; dec('BUILD_CERTIFICATE_BASE64', '$CERTIFICATE_PATH')"

            security create-keychain -p "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH

            security import $CERTIFICATE_PATH -k $KEYCHAIN_PATH -P "${P12_PASSWORD:-Television2012}" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/xcodebuild
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" $KEYCHAIN_PATH
            security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
            echo "Keychain initialized successfully."
          else
            echo "No signing certificates provided in Secrets. Proceeding with unsigned build."
          fi

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY" ] && [ -n "$APP_STORE_CONNECT_KEY_ID" ]; then
            mkdir -p ~/private_keys
            mkdir -p ~/.appstoreconnect/private_keys
            echo "$APP_STORE_CONNECT_API_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
            echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
            echo "App Store Connect API Key configured."
          fi

      - name: Build Xcode Archive and Export IPA
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "Building Flutter iOS release..."
          flutter build ios --release --no-codesign

          if [ -n "$APP_STORE_CONNECT_API_KEY" ] && [ -n "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "Archiving with xcodebuild and -allowProvisioningUpdates..."
            xcodebuild -workspace ios/Runner.xcworkspace \
                       -scheme Runner \
                       -sdk iphoneos \
                       -configuration Release \
                       -archivePath $RUNNER_TEMP/Runner.xcarchive \
                       -allowProvisioningUpdates \
                       -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
                       -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
                       -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
                       archive

            echo "Generating export_options.plist..."
            EXPORT_PLIST="ios/export_options.plist"
            rm -f "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :method string app-store" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :signingStyle string automatic" "$EXPORT_PLIST"
            /usr/libexec/PlistBuddy -c "Add :stripSwiftSymbols bool true" "$EXPORT_PLIST"

            echo "Exporting IPA with xcodebuild..."
            mkdir -p build/ios/ipa
            xcodebuild -exportArchive \
                       -archivePath $RUNNER_TEMP/Runner.xcarchive \
                       -exportOptionsPlist ios/export_options.plist \
                       -exportPath build/ios/ipa \
                       -allowProvisioningUpdates \
                       -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
                       -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
                       -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID
          else
            echo "App Store Connect API Key not provided. Skipping signed archive and export."
          fi

      - name: Upload IPA to App Store Connect / TestFlight (if API Key provided)
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY || secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_KEY_ID || secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY" ] && [ -n "$APP_STORE_CONNECT_KEY_ID" ] && [ -n "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "Uploading IPA to App Store Connect..."
            xcrun altool --upload-app -f build/ios/ipa/*.ipa \
              --type ios \
              --apiKey "$APP_STORE_CONNECT_KEY_ID" \
              --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
            echo "IPA uploaded to App Store Connect successfully!"
          else
            echo "App Store Connect API Key not provided. Skipping upload."
          fi

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifact
          path: |
            build/ios/ipa/*.ipa
            build/ios/iphoneos/Runner.app
          if-no-files-found: ignore
